<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" role="img" aria-labelledby="title description">
  <title id="title">HomeSight logo</title>
  <desc id="description">A green house roofline framing a purple magnifying glass with a rising green bar chart and trend arrow inside, followed by the word HomeSight in green and purple.</desc>
  <defs>
    <linearGradient id="roofGradient" x1="30" y1="30" x2="150" y2="110" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4FBE7C"/>
      <stop offset="1" stop-color="#1F8A52"/>
    </linearGradient>
    <linearGradient id="glassGradient" x1="55" y1="70" x2="140" y2="145" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8553B8"/>
      <stop offset="1" stop-color="#5D318B"/>
    </linearGradient>
  </defs>

  <!-- Roofline: open house frame -->
  <path d="M28 96 90 38l62 58" fill="none" stroke="url(#roofGradient)" stroke-width="11"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Magnifying glass -->
  <circle cx="90" cy="103" r="30" fill="none" stroke="url(#glassGradient)" stroke-width="10"/>
  <path d="M112 125 135 148" fill="none" stroke="url(#glassGradient)" stroke-width="12" stroke-linecap="round"/>

  <!-- Bar chart + trend line inside the glass -->
  <rect x="71" y="110" width="9" height="14" rx="1.5" fill="url(#roofGradient)"/>
  <rect x="85" y="102" width="9" height="22" rx="1.5" fill="url(#roofGradient)"/>
  <rect x="99" y="92" width="9" height="32" rx="1.5" fill="url(#roofGradient)"/>
  <path d="M69 112 86 96 94 102 110 82" fill="none" stroke="url(#roofGradient)" stroke-width="6"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M101 83 112 80 115 91" fill="none" stroke="url(#roofGradient)" stroke-width="6"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text x="192" y="128" font-family="'Inter', 'Segoe UI', Helvetica, Arial, sans-serif" font-size="84" font-weight="500" letter-spacing="-3">
    <tspan fill="#248F57">Home</tspan><tspan fill="#6B3D9B">Sight</tspan>
  </text>
</svg>
